version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: game-backend-postgres
    environment:
      POSTGRES_DB: game_backend
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d game_backend"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
